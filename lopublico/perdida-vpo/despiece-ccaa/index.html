	<!-- Replica en local la lógica de civio.es/assets/chunks/article.js
	     para que el wrapper .full-width se vea idéntico al de producción -->
	<script>
		(function () {
			function applyFullWidth() {
				var sb = window.innerWidth - document.body.clientWidth;
				var w = 'calc(100vw - ' + sb + 'px)';
				document.querySelectorAll('.full-width').forEach(function (el) {
					el.style.width = w;
				});
			}
			if (document.readyState === 'loading') {
				document.addEventListener('DOMContentLoaded', applyFullWidth);
			} else {
				applyFullWidth();
			}
			window.addEventListener('resize', applyFullWidth);
		})();
	</script>
